name: quickplay
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  device_preview: ^1.3.1
  flutter:
    sdk: flutter
  flutter_animate: ^4.5.2
  go_router: ^17.1.0
  google_fonts: ^8.0.2
  provider: ^6.1.5+1
  shared_preferences: ^2.5.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/games/

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
  image_path: "assets/images/quickplay_logo.png"
  adaptive_icon_foreground: "assets/images/quickplay_logo.png"
  adaptive_icon_background: "#3C3CF6"
